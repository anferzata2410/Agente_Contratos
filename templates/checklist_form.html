<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check List - Solicitud de Credito | Aluri</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css?v=10">
</head>
<body>

  <!-- ── Datalist de sugerencias para estado civil ── -->
  <datalist id="opciones-estado-civil">
    <option value="Soltero/a">
    <option value="Soltero/a con union marital de hecho">
    <option value="Soltero/a sin union marital de hecho">
    <option value="Casado/a con sociedad conyugal vigente">
    <option value="Casado/a con capitulaciones">
    <option value="Union libre">
    <option value="Divorciado/a">
    <option value="Viudo/a">
  </datalist>

  <!-- ── Header ── -->
  <header class="page-header">
    <div class="header-content">
      <img src="/static/img/logo-aluri.svg" alt="Aluri" class="header-logo">
      <div>
        <h1>FORMULARIO DE SOLICITUD</h1>
        <div class="subtitle">Check List - Informacion Requerida</div>
      </div>
    </div>
  </header>

  <div class="container">
    <form id="checklist-form" onsubmit="event.preventDefault()" autocomplete="off">

      <!-- ══════════ TIPO DE CONTRATO ══════════ -->
      <div class="section">
        <div class="section-header">TIPO DE CONTRATO</div>
        <div class="section-body">
          <div class="form-grid">
            <div class="field">
              <label>Tipo de contrato <span class="required">*</span></label>
              <select id="tipo_contrato" required>
                <option value="">Seleccionar...</option>
                <option value="Hipoteca">Hipoteca</option>
                <option value="Compraventa con Pacto de Retroventa">Compraventa con Pacto de Retroventa</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <!-- ══════════ DEUDORES ══════════ -->
      <div class="section">
        <div class="section-header">
          INFORMACION DEL(LOS) DEUDOR(ES)
          <span class="badge">OBLIGATORIO</span>
        </div>
        <div class="section-body">
          <div id="deudores-container">
            <!-- Se crea 1 deudor vacio al iniciar -->
          </div>
          <button type="button" class="add-btn" onclick="agregarDeudor()">
            + Agregar Deudor
          </button>
        </div>
      </div>

      <!-- ══════════ CODEUDORES ══════════ -->
      <div class="section">
        <div class="section-header">
          CODEUDORES
          <span class="badge">OPCIONAL</span>
        </div>
        <div class="section-body">
          <div id="codeudores-container">
          </div>
          <button type="button" class="add-btn" onclick="agregarCodeudor()">
            + Agregar Codeudor
          </button>
        </div>
      </div>

      <!-- ══════════ ACREEDORES ══════════ -->
      <div class="section">
        <div class="section-header">
          INFORMACION DE ACREEDORES
          <span class="badge">OBLIGATORIO</span>
        </div>
        <div class="section-body">
          <div id="acreedores-container">
            <!-- Se crean 2 acreedores vacios al iniciar -->
          </div>
          <button type="button" class="add-btn" onclick="agregarAcreedor()">
            + Agregar Acreedor
          </button>
        </div>
      </div>

      <!-- ══════════ INMUEBLE ══════════ -->
      <div class="section" id="seccion-inmueble">
        <div class="section-header">
          INFORMACION DEL INMUEBLE
          <span class="badge">OBLIGATORIO</span>
        </div>
        <div class="section-body">
          <div id="inmueble-container"></div>
          <button type="button" class="add-btn" id="btn-agregar-inmueble" onclick="mostrarInmueble()">
            + Agregar datos del Inmueble
          </button>
        </div>
      </div>

      <!-- ══════════ CONDICIONES DEL PRESTAMO ══════════ -->
      <div class="section" id="seccion-prestamo">
        <div class="section-header">
          CONDICIONES DEL PRESTAMO
          <span class="badge">OBLIGATORIO</span>
        </div>
        <div class="section-body">
          <div id="prestamo-container"></div>
          <button type="button" class="add-btn" id="btn-agregar-prestamo" onclick="mostrarPrestamo()">
            + Agregar condiciones del Prestamo
          </button>
        </div>
      </div>

    </form>
  </div>

  <!-- ── Input oculto para subir archivos ── -->
  <input type="file" id="archivo-checklist" accept=".docx" style="display:none" onchange="cargarArchivoSeleccionado()">

  <!-- ── Barra de acciones fija ── -->
  <div class="actions-bar">
    <button type="button" class="btn btn-secondary" onclick="limpiarFormulario()">
      Limpiar
    </button>
    <button type="button" class="btn btn-primary" id="btn-cargar" onclick="cargarCheckList()">
      Cargar Check List (.docx)
    </button>
    <button type="button" class="btn btn-success" id="btn-generar-docx" onclick="generarContrato('docx')">
      Descargar Contrato (.docx)
    </button>
    <button type="button" class="btn btn-pdf" id="btn-generar-pdf" onclick="generarContrato('pdf')">
      Descargar Formulario (.pdf)
    </button>
  </div>

  <!-- ── Loading overlay ── -->
  <div id="loading-overlay" class="loading-overlay" style="display:none">
    <div class="loading-box">
      <div class="spinner"></div>
      <p id="loading-text">Procesando...</p>
    </div>
  </div>

  <script src="/static/js/app.js?v=25"></script>
</body>
</html>
